<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RVA Helps Me</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header id="app-header">RVA Helps Me</header>

    <main id="chat-container"></main>

    <div class="input-wrapper">
        <div class="input-pill">
            <button id="mic-btn" aria-label="Microphone">
                <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"></path>
                    <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                    <line x1="12" y1="19" x2="12" y2="23"></line>
                    <line x1="8" y1="23" x2="16" y2="23"></line>
                </svg>
            </button>
            <textarea id="user-input" rows="1" placeholder="Ask me anything..." autocomplete="off"></textarea>
            <button id="send-btn" aria-label="Send" disabled>
                <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="20" x2="12" y2="4"></line>
                    <polyline points="5 11 12 4 19 11"></polyline>
                </svg>
            </button>
        </div>
        <div class="disclaimer">Rhonda's information is curated by humans and always verified.</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
