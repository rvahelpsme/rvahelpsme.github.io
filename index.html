<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rhonda | RVAHelps</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; }
        #chat-box { border: 1px solid #ccc; height: 400px; overflow-y: auto; padding: 10px; margin-bottom: 10px; border-radius: 4px; }
        .message { margin-bottom: 10px; padding: 10px; border-radius: 4px; }
        .user-msg { background-color: #e3f2fd; text-align: right; }
        .rhonda-msg { background-color: #f5f5f5; text-align: left; line-height: 1.4; }
        .input-group { display: flex; gap: 10px; }
        input[type="text"] { flex-grow: 1; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 20px; background-color: #0056b3; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #004494; }
    </style>
</head>
<body>
    <h1>Chat with Rhonda</h1>
    <div id="chat-box"></div>
    <div class="input-group">
        <input type="text" id="user-input" placeholder="Type a message to Rhonda..." onkeypress="handleKeyPress(event)">
        <button onclick="sendMessage()">Send</button>
    </div>

    <script>
        // Your active Cloud Run backend URL
        const BACKEND_URL = "https://rhonda-backend-1071663876445.us-east4.run.app";

        function appendMessage(sender, text, className) {
            const box = document.getElementById('chat-box');
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${className}`;
            msgDiv.innerHTML = `<strong>${sender}:</strong> ${text}`;
            box.appendChild(msgDiv);
            box.scrollTop = box.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const message = input.value.trim();
            if (!message) return;

            appendMessage('You', message, 'user-msg');
            input.value = '';

            try {
                const response = await fetch(`${BACKEND_URL}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });

                const data = await response.json();

                if (data.status === 'success') {
                    appendMessage('Rhonda', data.response, 'rhonda-msg');
                } else {
                    appendMessage('System', 'Error: Invalid response format from server.', 'rhonda-msg');
                }
            } catch (error) {
                appendMessage('System', `Connection error: ${error.message}`, 'rhonda-msg');
            }
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }
    </script>
</body>
</html>
